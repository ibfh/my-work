<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 远程控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #1a1a2e;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #12121f;
            border-radius: 12px;
            padding: 12px 18px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.online {
            background: #00c853;
            box-shadow: 0 0 10px #00c85366;
        }

        .status-dot.offline {
            background: #ff1744;
            box-shadow: 0 0 10px #ff174466;
        }

        .device-id {
            font-size: 13px;
            color: #888;
            font-family: monospace;
        }

        .cmd-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .cmd-btn {
            background: #252545;
            border: none;
            color: #fff;
            padding: 16px 8px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .cmd-btn:active {
            transform: scale(0.94);
        }

        .cmd-btn:hover {
            background: #333366;
        }

        .cmd-btn.danger {
            background: #4a1a1a;
        }

        .cmd-btn.danger:hover {
            background: #6a2222;
        }

        .cmd-btn.primary {
            background: #1a3a5a;
        }

        .cmd-btn.primary:hover {
            background: #1a4a7a;
        }

        .cmd-btn.full {
            grid-column: 1 / -1;
        }

        .log-box {
            background: #0a0a14;
            border-radius: 12px;
            padding: 14px 16px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.8;
            border: 1px solid #2a2a44;
            margin-top: 8px;
        }

        .log-box .log-time {
            color: #666;
        }

        .log-box .log-ok {
            color: #69db7c;
        }

        .log-box .log-err {
            color: #ff6b6b;
        }

        .log-box .log-cmd {
            color: #74c0fc;
        }

        .log-box .log-msg {
            color: #ffd43b;
        }

        .log-empty {
            color: #555;
            text-align: center;
            padding-top: 30px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin: 12px 0 8px;
        }

        .input-row input {
            flex: 1;
            background: #12121f;
            border: 1px solid #2a2a44;
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-row input:focus {
            border-color: #4a4a8a;
        }

        .input-row button {
            background: #2a2a5a;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .input-row button:hover {
            background: #3a3a7a;
        }

        .footer {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 20px;
        }

        /* 滚动条 */
        .log-box::-webkit-scrollbar {
            width: 4px;
        }
        .log-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📡 远程控制台</h1>
        <div class="subtitle">网页端 · 主控面板</div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div>
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
            <span class="device-id" id="deviceId">等待设备...</span>
        </div>

        <!-- 指令按钮 -->
        <div class="cmd-grid">
            <button class="cmd-btn primary" data-cmd="ping">🏓 Ping</button>
            <button class="cmd-btn primary" data-cmd="get_status">📊 状态</button>
            <button class="cmd-btn primary" data-cmd="take_photo">📷 拍照</button>
            <button class="cmd-btn primary" data-cmd="get_location">📍 位置</button>
            <button class="cmd-btn primary" data-cmd="send_notification">🔔 通知</button>
            <button class="cmd-btn danger" data-cmd="reboot">🔄 重启App</button>
            <button class="cmd-btn danger full" data-cmd="force_offline">⛔ 强制离线</button>
        </div>

        <!-- 自定义指令 -->
        <div class="input-row">
            <input type="text" id="customCmd" placeholder="输入自定义指令...">
            <button id="sendCustomBtn">发送</button>
        </div>

        <!-- 日志 -->
        <div class="log-box" id="logBox">
            <div class="log-empty">📭 等待指令...</div>
        </div>

        <div class="footer">最高权限 · 网页端主控</div>
    </div>

    <script>
        // ============================================================
        //  配置区 —— 等你拿到 Render 地址后，改这里就行
        // ============================================================
        const WS_URL = 'ws://localhost:8080';  // ← 以后改成你的 Render 地址

        // ============================================================
        //  核心代码（不用改）
        // ============================================================
        let ws = null;
        let deviceId = '未识别';
        let isOnline = false;

        const logBox = document.getElementById('logBox');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceIdEl = document.getElementById('deviceId');

        function log(message, type = '') {
            // 清空占位
            const empty = logBox.querySelector('.log-empty');
            if (empty) empty.remove();

            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function setStatus(online, id = null) {
            isOnline = online;
            if (id) deviceId = id;
            statusDot.className = 'status-dot ' + (online ? 'online' : 'offline');
            statusText.textContent = online ? '已连接' : '未连接';
            deviceIdEl.textContent = online ? '🖥️ ' + deviceId : '等待设备...';
        }

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            log('🔄 正在连接服务器...', 'msg');

            try {
                ws = new WebSocket(WS_URL);
            } catch (e) {
                log('❌ 连接失败: ' + e.message, 'err');
                return;
            }

            ws.onopen = () => {
                log('✅ 服务器连接成功！', 'ok');
                setStatus(true);
            };

            ws.onmessage = (event) => {
                let data;
                try {
                    data = JSON.parse(event.data);
                } catch {
                    data = { raw: event.data };
                }

                // 处理设备ID
                if (data.device_id) {
                    deviceId = data.device_id;
                    setStatus(true, deviceId);
                }

                // 处理响应
                if (data.status) {
                    log('📨 响应: ' + JSON.stringify(data), data.status === 'success' ? 'ok' : 'err');
                } else if (data.event) {
                    log('📢 事件: ' + data.event + ' ' + JSON.stringify(data.data || ''), 'msg');
                } else {
                    log('📨 收到: ' + JSON.stringify(data), 'msg');
                }
            };

            ws.onerror = (error) => {
                log('⚠️ 连接错误', 'err');
                setStatus(false);
            };

            ws.onclose = () => {
                log('🔌 连接已断开，5秒后重连...', 'err');
                setStatus(false);
                setTimeout(connect, 5000);
            };
        }

        function sendCommand(cmd, params = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ 未连接到服务器！', 'err');
                return;
            }
            const msg = JSON.stringify({
                type: 'command',
                cmd: cmd,
                cmd_id: 'web_' + Date.now(),
                params: params,
                timestamp: Math.floor(Date.now() / 1000)
            });
            ws.send(msg);
            log('📤 发送指令: ' + cmd + (Object.keys(params).length ? ' ' + JSON.stringify(params) : ''), 'cmd');
        }

        // ============================================================
        //  按钮绑定
        // ============================================================
        document.querySelectorAll('[data-cmd]').forEach(btn => {
            btn.addEventListener('click', () => {
                const cmd = btn.dataset.cmd;
                // 某些指令带参数示例
                if (cmd === 'send_notification') {
                    const title = prompt('通知标题:', '来自网页');
                    if (title === null) return;
                    const content = prompt('通知内容:', '你好！');
                    if (content === null) return;
                    sendCommand(cmd, { title, content });
                } else {
                    sendCommand(cmd);
                }
            });
        });

        document.getElementById('sendCustomBtn').addEventListener('click', () => {
            const input = document.getElementById('customCmd');
            const text = input.value.trim();
            if (!text) return;
            // 尝试解析为JSON，否则当普通字符串发
            try {
                const obj = JSON.parse(text);
                sendCommand(obj.cmd || 'custom', obj.params || {});
            } catch {
                sendCommand('custom', { message: text });
            }
            input.value = '';
        });

        document.getElementById('customCmd').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendCustomBtn').click();
            }
        });

        // ============================================================
        //  启动
        // ============================================================
        connect();
        log('🚀 控制面板已启动', 'ok');
        log('💡 提示: 连接成功后，点击按钮发送指令', 'msg');
    </script>

</body>
</html>
